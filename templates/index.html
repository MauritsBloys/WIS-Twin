<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Water Testbed Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 20px; }
    h1 { color: #4fc3f7; font-size: 1.4rem; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 0.82rem; margin-bottom: 16px; }

    /* ── Schematic ── */
    .schematic-wrap {
      background: #0d1b2a;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 14px 14px 8px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .schematic-wrap .card-title {
      font-size: 0.85rem; color: #4fc3f7; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    svg#schematic { width: 100%; height: auto; display: block; }

    /* ── Popup ── */
    .ctrl-popup {
      position: absolute;
      background: #16213e;
      border: 1px solid #4fc3f7;
      border-radius: 8px;
      padding: 14px;
      z-index: 200;
      min-width: 210px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    }
    .ctrl-popup.hidden { display: none; }
    .ctrl-popup h3 { color: #4fc3f7; font-size: 0.88rem; margin-bottom: 12px; }
    .popup-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .popup-row label { font-size: 0.78rem; color: #aaa; width: 52px; flex-shrink: 0; }
    .popup-row input[type=range] { flex: 1; accent-color: #4fc3f7; }
    .popup-row input[type=number] {
      width: 58px; background: #0d1b2a; border: 1px solid #0f3460;
      color: #e0e0e0; border-radius: 4px; padding: 4px 5px; font-size: 0.8rem;
    }
    .popup-btns { display: flex; gap: 6px; margin-top: 6px; }
    .popup-btns button {
      cursor: pointer; border: none; border-radius: 4px;
      padding: 6px 10px; font-size: 0.78rem; font-weight: 600; flex: 1;
    }
    .pb-min { background: #3e0000; color: #ef9a9a; border: 1px solid #ef9a9a !important; }
    .pb-max { background: #1b5e20; color: #81c784; border: 1px solid #81c784 !important; }
    .pb-set { background: #0f3460; color: #4fc3f7; border: 1px solid #4fc3f7 !important; }
    .pb-x   { background: #1e1e3a; color: #888; }

    /* ── Bottom grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 14px; }
    .card { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 16px; }
    .card h2 {
      font-size: 0.85rem; color: #4fc3f7; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 13px;
    }
    .relay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .relay-item { display: flex; flex-direction: column; gap: 4px; }
    .relay-label { font-size: 0.76rem; color: #aaa; }
    .btn-row { display: flex; gap: 5px; }
    button { cursor: pointer; border: none; border-radius: 5px; padding: 7px 11px; font-size: 0.78rem; font-weight: 600; transition: opacity 0.15s; }
    button:hover { opacity: 0.85; }
    .btn-on     { background: #2e7d32; color: #fff; }
    .btn-off    { background: #b71c1c; color: #fff; }
    .btn-action { background: #0f3460; color: #4fc3f7; border: 1px solid #4fc3f7; width: 100%; margin-top: 8px; padding: 9px; }
    .btn-danger { background: #7b1fa2; color: #fff; width: 100%; margin-top: 8px; padding: 9px; }
    .mode-row { display: flex; gap: 8px; margin-bottom: 13px; }
    .btn-mode { background: #01579b; color: #fff; flex: 1; padding: 9px; border-radius: 5px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
    .btn-mode.active { background: #0288d1; box-shadow: 0 0 8px #0288d1; }
    .status-box {
      background: #0d1b2a; border-radius: 6px; padding: 10px;
      font-size: 0.76rem; color: #90caf9; min-height: 52px; white-space: pre-wrap;
    }
    .conn-badge { font-size: 0.7rem; padding: 2px 7px; border-radius: 10px; font-weight: 700; }
    .conn-ok  { background: #1b5e20; color: #66bb6a; }
    .conn-err { background: #3e0000; color: #ef9a9a; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #0f3460; color: #4fc3f7;
      border: 1px solid #4fc3f7; border-radius: 6px;
      padding: 10px 18px; font-size: 0.85rem; display: none; z-index: 9999;
    }
    .toast.error { background: #3e0000; color: #ef9a9a; border-color: #ef9a9a; }

    @media (max-width: 600px) { body { padding: 10px; } }
  </style>
</head>

      <text x="758" y="138" fill="#cfd8dc" font-size="10" text-anchor="middle"

      <rect x="746" y="288" width="24" height="10" rx="2" fill="#444" id="gbar-204"/>

      <h2>Relays</h2>

    <!-- System / emergency -->

      <button class="btn-action" onclick="sendPost('/api/close-all', null, 'Close all')">Sluit alle valves</button>

  <div id="toast" class="toast"></div>

  <script>
    const RELAYS = ['main','fireflies','well-pump','rain-pump','pc','free1','free2','free3'];
    const GATES  = [201, 202, 203, 204];

    // Pump state (optimistic tracking)
    const pumpState = { 'well-pump': false, 'rain-pump': false };

    // Popup state
    let popupType = null;
    let popupId   = null;

    // ── Build relay buttons ───────────────────────────────────────────────────
    const rg = document.getElementById('relay-grid');
    RELAYS.forEach(r => {
      rg.innerHTML += `
        <div class="relay-item">
          <span class="relay-label">${r}</span>
          <div class="btn-row">
            <button class="btn-on"  onclick="relayAction('${r}','on')">AAN</button>
            <button class="btn-off" onclick="relayAction('${r}','off')">UIT</button>
          </div>
        </div>`;
    });

    // ── Pump toggle ───────────────────────────────────────────────────────────
    function togglePump(relay) {
      const next   = !pumpState[relay];
      const action = next ? 'on' : 'off';
      fetch(`/api/relay/${relay}/${action}`, {method: 'POST'})
        .then(r => r.json())
        .then(d => {
          if (d.error) { showToast('Fout: ' + d.error, true); return; }
          pumpState[relay] = next;
          applyPumpVisual(relay);
          showToast(`${relay}: ${action.toUpperCase()}`);
        })
        .catch(() => showToast('Geen verbinding', true));
    }

    function applyPumpVisual(relay) {
      const on = pumpState[relay];
      if (relay === 'well-pump') {
        document.getElementById('well-pump-rect').setAttribute('fill', on ? '#2e7d32' : '#1b5e20');
        document.getElementById('well-pump-txt').setAttribute('fill', on ? '#c8e6c9' : '#a5d6a7');
      } else {
        document.getElementById('rain-pump-rect').setAttribute('fill', on ? '#c62828' : '#3e0000');
        document.getElementById('rain-pump-txt').setAttribute('fill', on ? '#ffcdd2' : '#ef9a9a');
      }
    }

    // ── Gate popup ────────────────────────────────────────────────────────────
    function openGatePopup(node, svgX, svgY) {
      popupType = 'gate';
      popupId   = node;
      const s = document.getElementById('popup-slider');
      const n = document.getElementById('popup-num');
      s.max = 255; s.value = 0;
      n.max = 255; n.value = 0;
      document.getElementById('popup-title').textContent = `Gate ${node - 200} (node ${node})`;
      document.getElementById('popup-lbl').textContent = '0–255';
      document.getElementById('pb-max-btn').textContent = '255';
      showPopup(svgX, svgY);
    }

    function openValvePopup(valve, svgX, svgY) {
      popupType = 'valve';
      popupId   = valve;
      const s = document.getElementById('popup-slider');
      const n = document.getElementById('popup-num');
      s.max = 90; s.value = 0;
      n.max = 90; n.value = 0;
      document.getElementById('popup-title').textContent = `Valve ${valve}`;
      document.getElementById('popup-lbl').textContent = '0–90°';
      document.getElementById('pb-max-btn').textContent = '90°';
      showPopup(svgX, svgY);
    }

    function showPopup(svgX, svgY) {
      const popup   = document.getElementById('ctrl-popup');
      const wrap    = document.querySelector('.schematic-wrap');
      const svgEl   = document.getElementById('schematic');
      const sr      = svgEl.getBoundingClientRect();
      const wr      = wrap.getBoundingClientRect();
      const scaleX  = sr.width  / 900;
      const scaleY  = sr.height / 530;

      let left = (svgX * scaleX) + (sr.left - wr.left);
      let top  = (svgY * scaleY) + (sr.top  - wr.top);

      // Keep within wrapper
      const pw = 220, ph = 110;
      if (left + pw > wr.width  - 8) left = wr.width  - pw - 8;
      if (left < 5)                  left = 5;
      if (top  + ph > wr.height - 8) top  = top - ph - 28;
      if (top  < 30)                 top  = 30;

      popup.style.left = left + 'px';
      popup.style.top  = top  + 'px';
      popup.classList.remove('hidden');
    }

    function closePopup() {
      document.getElementById('ctrl-popup').classList.add('hidden');
      popupType = null; popupId = null;
    }

    function popupMin() {
      document.getElementById('popup-slider').value = 0;
      document.getElementById('popup-num').value    = 0;
    }

    function popupMax() {
      const m = document.getElementById('popup-slider').max;
      document.getElementById('popup-slider').value = m;
      document.getElementById('popup-num').value    = m;
    }

    function popupApply() {
      const val = parseInt(document.getElementById('popup-num').value);
      if (popupType === 'gate') {
        fetch(`/api/firefly/gate/${popupId}/${val}`, {method: 'POST'})
          .then(r => r.json())
          .then(d => {
            if (d.error) { showToast('Fout: ' + d.error, true); return; }
            showToast(`Gate ${popupId} → ${val}`);
            closePopup();
          })
          .catch(() => showToast('Geen verbinding', true));
      } else {
        fetch('/api/valve', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({valve: popupId, position: val})
        })
          .then(r => r.json())
          .then(d => {
            if (d.error) { showToast('Fout: ' + d.error, true); return; }
            showToast(`Valve ${popupId} → ${val}°`);
            closePopup();
          })
          .catch(() => showToast('Geen verbinding', true));
      }
    }

    // Close popup on outside click
    document.addEventListener('click', e => {
      const popup = document.getElementById('ctrl-popup');
      if (!popup.classList.contains('hidden') &&
          !popup.contains(e.target) &&
          !e.target.closest('#schematic')) {
        closePopup();
      }
    });

    // ── Relay action ──────────────────────────────────────────────────────────
    function relayAction(relay, action) {
      sendPost(`/api/relay/${relay}/${action}`, null, `${relay} → ${action}`);
      if (relay in pumpState) {
        pumpState[relay] = (action === 'on');
        applyPumpVisual(relay);
      }
    }

    // ── Gate mode ─────────────────────────────────────────────────────────────
    function setMode(mode) {
      fetch(`/api/firefly/mode/${mode}`, {method: 'POST'})
        .then(r => r.json())
        .then(d => {
          if (d.error) { showToast('Fout: ' + d.error, true); return; }
          document.getElementById('btn-manual').classList.toggle('active', mode === 'manual');
          document.getElementById('btn-auto').classList.toggle('active',   mode === 'auto');
          showToast('Mode: ' + mode);
        })
        .catch(() => showToast('Geen verbinding', true));
    }

    // ── Fetch status ──────────────────────────────────────────────────────────
    function fetchStatus() {
      fetch('/api/status')
        .then(r => r.json())
        .then(d => {
          if (d.error) { document.getElementById('status-box').textContent = 'Fout: ' + d.error; return; }
          document.getElementById('status-box').textContent =
            'Monitor: ' + (d.monitor || '–') + '\n' +
            'Relays:  ' + (d.relays  || '–') + '\n' +
            'Valves:  ' + (d.valves  || '–');
        })
        .catch(() => {});
    }

    // ── Fetch Firefly data ────────────────────────────────────────────────────
    function fetchFirefly() {
      fetch('/api/firefly/status')
        .then(r => r.json())
        .then(d => {
          const badge = document.getElementById('ff-badge');
          badge.textContent = d.connected ? 'Firefly verbonden' : 'Firefly niet verbonden';
          badge.className   = 'conn-badge ' + (d.connected ? 'conn-ok' : 'conn-err');

          // Sensor labels in SVG
          for (let i = 1; i <= 7; i++) {
            const info = d.sensors[String(i)];
            const el   = document.getElementById('sv-' + i);
            if (el) el.textContent = `S${i}: ${info && info.cm != null ? info.cm.toFixed(1) + ' cm' : '–'}`;
          }

          // Gate state: color the indicator bar and tint the gate block
          GATES.forEach(n => {
            const val  = d.actuators[String(n)];
            const bar  = document.getElementById('gbar-' + n);
            const rect = document.getElementById('grect-' + n);
            if (bar && val != null) {
              const pct = val / 255;
              // Green when open, red when closed
              const r = Math.round(150 - pct * 100);
              const g = Math.round(60  + pct * 120);
              bar.setAttribute('fill', `rgb(${r},${g},80)`);
            }
            if (rect && val != null) {
              const pct = val / 255;
              const borderCol = pct > 0.5 ? '#81c784' : pct > 0.1 ? '#ffd54f' : '#cfd8dc';
              rect.setAttribute('stroke', borderCol);
            }
          });
        })
        .catch(() => {});
    }

    // ── Utility ───────────────────────────────────────────────────────────────
    function sendPost(url, body, label) {
      const opts = {method: 'POST', headers: {'Content-Type': 'application/json'}};
      if (body) opts.body = JSON.stringify(body);
      fetch(url, opts)
        .then(r => r.json())
        .then(d => {
          if (d.error) { showToast('Fout: ' + d.error, true); return; }
          showToast((label || url) + ' — OK');
          fetchStatus();
        })
        .catch(() => showToast('Geen verbinding', true));
    }

    function confirmShutdown() {
      if (confirm('Weet je zeker dat je het systeem wilt uitschakelen?')) {
        sendPost('/api/shutdown', null, 'Noodstop verzonden');
      }
    }

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent  = msg;
      t.className    = 'toast' + (isError ? ' error' : '');
      t.style.display = 'block';
      clearTimeout(t._to);
      t._to = setTimeout(() => t.style.display = 'none', 3000);
    }

    // ── Auto-refresh ──────────────────────────────────────────────────────────
    fetchStatus();
    fetchFirefly();
    setInterval(fetchStatus,  10000);
    setInterval(fetchFirefly,  2000);
  </script>
</body>
</html>
